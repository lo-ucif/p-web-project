<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - TechHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon"></div>
                TechHub
            </a>

            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html?category=smartphone">Phones</a></li>
                <li><a href="index.html?category=laptop">Laptops</a></li>
                <li><a href="index.html?category=tablet">Tablets</a></li>
                <li><a href="index.html?category=accessory">Accessories</a></li>
            </ul>

            <div class="nav-actions">
                <button class="cart-btn" onclick="window.location.href='cart.html'">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </button>
                <a href="login.html" class="btn btn-primary btn-sm">Sign In</a>
            </div>
        </div>
    </nav>

    <main class="section">
        <div class="container">
            <h1 style="margin-bottom: 24px;">Shopping Cart</h1>
            <div id="cartContent"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div>
                    <div class="footer-brand">
                        <div class="logo-icon"></div>
                        TechHub
                    </div>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="index.html?category=smartphone">Phones</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Account</h4>
                    <ul>
                        <li><a href="login.html">Login</a></li>
                        <li><a href="signup.html">Sign Up</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Contact</h4>
                    <ul>
                        <li><a href="#">+1 234 567 890</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2024 TechHub. Constantine 2 University.</p>
            </div>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });

        function renderCart() {
            const items = Cart.getItems();
            const container = document.getElementById('cartContent');

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-bag" style="font-size: 4rem; color: var(--muted); margin-bottom: 16px;"></i>
                        <h3>Your cart is empty</h3>
                        <p>Looks like you haven't added any items yet.</p>
                        <a href="index.html" class="btn btn-primary">Start Shopping</a>
                    </div>
                `;
                return;
            }

            const subtotal = Cart.getSubtotal();
            const tax = Cart.getTax();
            const total = Cart.getTotal();

            container.innerHTML = `
                <div class="cart-page">
                    <div class="cart-items">
                        ${items.map(item => `
                            <div class="cart-item">
                                <img src="${item.image}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80/EEEEF5/888888?text=Product'">
                                <div class="cart-item-details">
                                    <h4>${item.name}</h4>
                                    <p>${item.brand}</p>
                                    ${item.selectedColor ? `<p>Color: ${item.selectedColor}</p>` : ''}
                                    ${item.selectedStorage ? `<p>Storage: ${item.selectedStorage}</p>` : ''}
                                </div>
                                <div class="cart-item-price">$${item.price}</div>
                                <div class="quantity-control">
                                    <button class="quantity-btn" onclick="updateCartItem('${item.id}', ${item.quantity - 1}, '${item.selectedColor || ''}', '${item.selectedStorage || ''}')">-</button>
                                    <span class="quantity-value">${item.quantity}</span>
                                    <button class="quantity-btn" onclick="updateCartItem('${item.id}', ${item.quantity + 1}, '${item.selectedColor || ''}', '${item.selectedStorage || ''}')">+</button>
                                </div>
                                <div style="text-align: right; min-width: 80px;">
                                    <p style="font-weight: 700; color: var(--primary);">$${(item.price * item.quantity).toFixed(2)}</p>
                                    <button onclick="removeCartItem('${item.id}', '${item.selectedColor || ''}', '${item.selectedStorage || ''}')" style="background: none; border: none; color: #dc3545; cursor: pointer; font-size: 0.875rem;">
                                        <i class="fas fa-trash"></i> Remove
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                        
                        <div style="padding: 16px; display: flex; justify-content: space-between; align-items: center;">
                            <a href="index.html" class="btn btn-outline btn-sm">
                                <i class="fas fa-arrow-left"></i> Continue Shopping
                            </a>
                            <button onclick="clearCart()" class="btn btn-sm" style="background: #f8d7da; color: #842029;">
                                <i class="fas fa-trash"></i> Clear Cart
                            </button>
                        </div>
                    </div>
                    
                    <div class="cart-summary">
                        <h3>Order Summary</h3>
                        <div class="summary-row">
                            <span>Subtotal (${Cart.getCount()} items)</span>
                            <span>$${subtotal.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span>Tax (10%)</span>
                            <span>$${tax.toFixed(2)}</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span style="color: #198754;">Free</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span>$${total.toFixed(2)}</span>
                        </div>
                        <a href="checkout.html" class="btn btn-primary" style="width: 100%; margin-top: 24px;">
                            Proceed to Checkout <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            `;
        }

        function updateCartItem(id, quantity, color, storage) {
            Cart.updateQuantity(parseInt(id), quantity, color || null, storage || null);
            renderCart();
        }

        function removeCartItem(id, color, storage) {
            Cart.remove(parseInt(id), color || null, storage || null);
            renderCart();
        }

        function clearCart() {
            if (confirm('Are you sure you want to clear your cart?')) {
                Cart.clear();
                renderCart();
            }
        }
    </script>

    <style>
        @media (max-width: 768px) {
            .cart-page {
                grid-template-columns: 1fr !important;
            }

            .cart-item {
                grid-template-columns: 60px 1fr !important;
            }

            .cart-item-price,
            .quantity-control {
                grid-column: 2;
            }
        }
    </style>
</body>

</html>
