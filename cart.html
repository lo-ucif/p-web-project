<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - TechStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-page="cart">
  <header class="site-header glass page-shell">
    <nav class="navbar">
      <a class="nav-brand" href="index.html"><span class="logo-dot"></span>TechStore</a>
      <div class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="index.html#products">Products</a>
        <a class="nav-link active" href="cart.html">Cart <span id="cartCount">0</span></a>
      </div>
    </nav>
  </header>

  <main class="cart-page page-shell">
    <h1 class="page-title" style="margin-bottom:1rem;">Your Cart</h1>
    <section class="cart-layout">
      <div class="cart-panel glass">
        <div id="cartItems"></div>
      </div>
      <aside class="summary-box">
        <div class="summary-row"><span>Subtotal</span><strong id="subtotal">$0.00</strong></div>
        <div class="summary-row"><span>Shipping</span><strong>$25.00</strong></div>
        <div class="summary-row"><span>Tax</span><strong id="tax">$0.00</strong></div>
        <hr style="border:0; border-top:1px solid var(--border); margin:0.6rem 0;">
        <div class="summary-row summary-total"><span>Total</span><strong id="total">$0.00</strong></div>
        <a class="btn btn-primary" href="checkout.html" style="width:100%; margin-top:0.7rem; text-align:center;">Checkout</a>
      </aside>
    </section>
  </main>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
