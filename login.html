<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TechHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                    <div class="logo-icon"></div>
                    <h1>TechHub</h1>
                </div>
                <p style="color: var(--muted); margin-top: 8px;">Sign in to your account</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.875rem;">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary); font-size: 0.875rem;">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-light);">
                <p style="color: var(--muted);">
                    Don't have an account? 
                    <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign Up</a>
                </p>
            </div>
            
            <div style="margin-top: 24px; text-align: center; padding: 16px; background: var(--section-bg); border-radius: 8px;">
                <p style="font-size: 0.75rem; color: var(--muted); margin-bottom: 8px;">Demo Credentials:</p>
                <p style="font-size: 0.75rem; color: var(--muted);">
                    Admin: admin@techhub.com / admin123<br>
                    User: user@example.com / user123
                </p>
            </div>
        </div>
    </div>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (Auth.isLoggedIn()) {
                window.location.href = 'profile.html';
                return;
            }
            
            initDemoUsers();
            
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const result = Auth.login(email, password);
                
                if (result.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 1000);
                } else {
                    showAlert(result.message, 'danger');
                }
            });
        });

        function initDemoUsers() {
            const users = Auth.getUsers();
            if (users.length === 0) {
                Auth.signup('Admin User', 'admin@techhub.com', 'admin123', '+1234567890');
                const adminUser = Auth.getUsers().find(u => u.email === 'admin@techhub.com');
                if (adminUser) {
                    adminUser.role = 'admin';
                    Auth.saveUsers(Auth.getUsers());
                }
                
                Auth.signup('John Doe', 'user@example.com', 'user123', '+1234567891');
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
