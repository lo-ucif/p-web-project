<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - TechStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-page="checkout">
  <header class="site-header glass page-shell">
    <nav class="navbar">
      <a class="nav-brand" href="index.html"><span class="logo-dot"></span>TechStore</a>
      <div class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="index.html#products">Products</a>
        <a class="nav-link active" href="cart.html">Cart <span id="cartCount">0</span></a>
      </div>
    </nav>
  </header>

  <main class="checkout-page page-shell">
    <section class="checkout-panel glass">
      <h1 class="page-title" style="margin-bottom:1rem;">Checkout</h1>
      <form id="checkoutForm" novalidate>
        <div class="form-grid">
          <div class="form-group full">
            <label for="fullName">Full Name</label>
            <input id="fullName" class="field" type="text" placeholder="Enter full name">
            <small class="error" id="fullNameError">Full name is required.</small>
          </div>

          <div class="form-group full">
            <label for="address">Address</label>
            <input id="address" class="field" type="text" placeholder="Street, city, zip code">
            <small class="error" id="addressError">Address is required.</small>
          </div>

          <div class="form-group">
            <label for="phone">Phone</label>
            <input id="phone" class="field" type="tel" placeholder="+213...">
            <small class="error" id="phoneError">Enter a valid phone number.</small>
          </div>

          <div class="form-group">
            <label for="payment">Payment Method</label>
            <select id="payment" class="select">
              <option value="">Select payment method</option>
              <option value="cash">Cash on Delivery</option>
              <option value="card">Credit Card</option>
              <option value="bank">Bank Transfer</option>
            </select>
            <small class="error" id="paymentError">Choose a payment method.</small>
          </div>
        </div>

        <button class="btn btn-primary" type="submit" style="width:100%; margin-top:0.9rem;">Submit Order</button>
      </form>
    </section>
  </main>

  <script src="js/cart.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
