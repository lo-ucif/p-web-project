<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - TechHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon"></div>
                TechHub
            </a>
            
            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html?category=smartphone">Phones</a></li>
                <li><a href="index.html?category=laptop">Laptops</a></li>
                <li><a href="index.html?category=tablet">Tablets</a></li>
                <li><a href="index.html?category=accessory">Accessories</a></li>
            </ul>
            
            <div class="nav-actions">
                <button class="cart-btn" onclick="window.location.href='cart.html'">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </button>
                <a href="profile.html" class="btn btn-primary btn-sm">Profile</a>
            </div>
        </div>
    </nav>

    <main class="section">
        <div class="container">
            <h1 style="margin-bottom: 24px;">Order History</h1>
            <div id="ordersContent"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2024 TechHub. Constantine 2 University.</p>
            </div>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.protect()) return;
            renderOrders();
        });

        function renderOrders() {
            const orders = Auth.getOrders();
            const container = document.getElementById('ordersContent');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-shopping-bag" style="font-size: 4rem; color: var(--muted);"></i>
                        <h3>No orders yet</h3>
                        <p>You haven't placed any orders yet.</p>
                        <a href="index.html" class="btn btn-primary">Start Shopping</a>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <p style="color: var(--muted);">${orders.length} order(s)</p>
                    <a href="index.html" class="btn btn-outline btn-sm">
                        <i class="fas fa-shopping-bag"></i> Continue Shopping
                    </a>
                </div>
                
                ${orders.map(order => `
                    <div style="background: white; border-radius: 12px; border: 1px solid var(--border-light); margin-bottom: 24px; overflow: hidden;">
                        <div style="background: var(--section-bg); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <h3 style="margin: 0; font-size: 1rem;">Order #${order.id}</h3>
                                    <span style="padding: 4px 12px; background: ${order.status === 'delivered' ? '#d1e7dd' : order.status === 'cancelled' ? '#f8d7da' : '#fff3cd'}; color: ${order.status === 'delivered' ? '#0f5132' : order.status === 'cancelled' ? '#842029' : '#856404'}; font-size: 0.75rem; font-weight: 600; border-radius: 4px;">
                                        ${order.status.toUpperCase()}
                                    </span>
                                </div>
                                <p style="margin: 4px 0 0; font-size: 0.875rem; color: var(--muted);">
                                    ${new Date(order.createdAt).toLocaleDateString()} • ${order.paymentMethod === 'cod' ? 'Cash on Delivery' : 'Credit Card'}
                                </p>
                            </div>
                            <div style="text-align: right;">
                                <p style="font-size: 0.875rem; color: var(--muted); margin: 0;">Total</p>
                                <p style="font-size: 1.25rem; font-weight: 700; color: var(--primary); margin: 0;">$${order.total.toFixed(2)}</p>
                            </div>
                        </div>
                        
                        <div style="padding: 24px;">
                            <h4 style="margin-bottom: 16px; font-size: 0.875rem; color: var(--muted);">Items</h4>
                            ${order.items.map(item => `
                                <div style="display: flex; gap: 16px; align-items: center; padding: 12px; background: var(--section-bg); border-radius: 8px; margin-bottom: 8px;">
                                    <img src="${item.image}" alt="${item.name}" style="width: 60px; height: 60px; object-fit: contain; background: white; border-radius: 6px;">
                                    <div style="flex: 1;">
                                        <p style="font-weight: 600; margin: 0;">${item.name}</p>
                                        <p style="font-size: 0.875rem; color: var(--muted); margin: 0;">Qty: ${item.quantity}</p>
                                    </div>
                                    <p style="font-weight: 600;">$${(item.price * item.quantity).toFixed(2)}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('')}
            `;
        }
    </script>
</body>
</html>
