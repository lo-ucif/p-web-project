<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - TechStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body data-page="product">
  <header class="site-header glass page-shell">
    <nav class="navbar">
      <a class="nav-brand" href="index.html"><span class="logo-dot"></span>TechStore</a>
      <div class="nav-links">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="index.html#products">Products</a>
        <a class="nav-link" href="cart.html">Cart <span id="cartCount">0</span></a>
      </div>
    </nav>
  </header>

  <main class="product-page page-shell">
    <section class="product-layout">
      <article class="gallery glass">
        <img id="mainImage" src="" alt="Product image" style="border-radius:12px; width:100%; max-height:460px; object-fit:cover;">
        <div id="thumbnailRow" class="thumbnail-row"></div>
      </article>

      <article class="details glass">
        <h1 id="productTitle" class="page-title"></h1>
        <p id="productPrice" style="font-size:1.5rem; font-weight:700; margin:0.4rem 0;"></p>
        <span id="availability" class="tag"></span>
        <p id="productDesc" class="text-muted" style="margin-top:0.8rem;"></p>

        <div style="margin-top:1rem;">
          <h3 style="margin-bottom:0.5rem;">Storage</h3>
          <div id="storageOptions" class="option-list"></div>
        </div>

        <div style="margin-top:1rem;">
          <h3 style="margin-bottom:0.5rem;">Color</h3>
          <div id="colorOptions" class="option-list"></div>
        </div>

        <button id="addToCartBtn" class="btn btn-primary" style="margin-top:1.2rem; width:100%;">Add to Cart</button>
      </article>
    </section>

    <section class="specs glass" style="margin-top:1rem;">
      <h2 style="margin-bottom:0.7rem;">Specifications</h2>
      <div id="specsGrid" style="display:grid; gap:0.55rem;"></div>
    </section>
  </main>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
