<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - TechHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon"></div>
                TechHub
            </a>
            
            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html?category=smartphone">Phones</a></li>
                <li><a href="index.html?category=laptop">Laptops</a></li>
                <li><a href="index.html?category=tablet">Tablets</a></li>
                <li><a href="index.html?category=accessory">Accessories</a></li>
            </ul>
            
            <div class="nav-actions">
                <button class="cart-btn" onclick="window.location.href='cart.html'">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </button>
                <a href="profile.html" class="btn btn-primary btn-sm">Profile</a>
            </div>
        </div>
    </nav>

    <main class="section">
        <div class="container">
            <div id="profileContent"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>© 2024 TechHub. Constantine 2 University.</p>
            </div>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/checkout.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.protect()) return;
            renderProfile();
        });

        function renderProfile() {
            const user = Auth.getCurrentUser();
            const orders = Auth.getOrders();
            
            const container = document.getElementById('profileContent');
            container.innerHTML = `
                <div style="display: grid; grid-template-columns: 280px 1fr; gap: 40px;">
                    <div style="background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light); height: fit-content;">
                        <div style="text-align: center; margin-bottom: 24px;">
                            <div style="width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; color: white; font-size: 2rem; font-weight: 700;">
                                ${user.name.charAt(0).toUpperCase()}
                            </div>
                            <h3 style="margin-bottom: 4px;">${user.name}</h3>
                            <p style="color: var(--muted); font-size: 0.875rem;">${user.email}</p>
                            <span style="display: inline-block; padding: 4px 12px; background: ${user.role === 'admin' ? '#dc3545' : 'var(--primary)'}; color: white; font-size: 0.75rem; font-weight: 600; border-radius: 4px; margin-top: 8px;">
                                ${user.role.toUpperCase()}
                            </span>
                        </div>
                        
                        <nav style="border-top: 1px solid var(--border-light); padding-top: 16px;">
                            <a href="#" onclick="showSection('profile')" class="profile-nav active" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600;">
                                <i class="fas fa-user"></i> My Profile
                            </a>
                            <a href="#" onclick="showSection('orders')" class="profile-nav" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600;">
                                <i class="fas fa-shopping-bag"></i> My Orders
                                <span style="margin-left: auto; background: var(--section-bg); padding: 2px 8px; border-radius: 10px; font-size: 0.75rem;">${orders.length}</span>
                            </a>
                            <a href="#" onclick="logout()" class="profile-nav" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: #dc3545; font-weight: 600;">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </a>
                            ${user.role === 'admin' ? `
                                <a href="pages/admin/dashboard.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: #dc3545; font-weight: 600; margin-top: 16px; border: 1px solid #dc3545;">
                                    <i class="fas fa-cog"></i> Admin Panel
                                </a>
                            ` : ''}
                        </nav>
                    </div>
                    
                    <div>
                        <div id="profileSection" class="profile-section">
                            <div style="background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light);">
                                <h2 style="margin-bottom: 24px;"><i class="fas fa-user" style="margin-right: 8px;"></i> Profile Information</h2>
                                <div id="profileAlert"></div>
                                
                                <form id="profileForm">
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>Full Name</label>
                                            <input type="text" id="profileName" value="${user.name}" required>
                                        </div>
                                        <div class="form-group">
                                            <label>Email</label>
                                            <input type="email" id="profileEmail" value="${user.email}" required>
                                        </div>
                                    </div>
                                    <div class="form-row">
                                        <div class="form-group">
                                            <label>Phone</label>
                                            <input type="tel" id="profilePhone" value="${user.phone || ''}">
                                        </div>
                                        <div class="form-group">
                                            <label>Account Type</label>
                                            <input type="text" value="${user.role}" disabled style="background: var(--section-bg);">
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save"></i> Save Changes
                                    </button>
                                </form>
                            </div>
                        </div>
                        
                        <div id="ordersSection" class="profile-section" style="display: none;">
                            <div style="background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light);">
                                <h2 style="margin-bottom: 24px;"><i class="fas fa-shopping-bag" style="margin-right: 8px;"></i> My Orders</h2>
                                
                                ${orders.length === 0 ? `
                                    <div class="empty-state">
                                        <i class="fas fa-shopping-bag" style="font-size: 3rem; color: var(--muted);"></i>
                                        <h3>No orders yet</h3>
                                        <p>Start shopping to see your orders here.</p>
                                        <a href="index.html" class="btn btn-primary">Start Shopping</a>
                                    </div>
                                ` : orders.map(order => `
                                    <div style="border: 1px solid var(--border-light); border-radius: 8px; padding: 16px; margin-bottom: 16px;">
                                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                                            <div>
                                                <strong>Order #${order.id}</strong>
                                                <p style="margin: 4px 0 0; font-size: 0.875rem; color: var(--muted);">
                                                    ${new Date(order.createdAt).toLocaleDateString()}
                                                </p>
                                            </div>
                                            <span style="padding: 4px 12px; background: ${order.status === 'delivered' ? '#d1e7dd' : order.status === 'cancelled' ? '#f8d7da' : '#fff3cd'}; color: ${order.status === 'delivered' ? '#0f5132' : order.status === 'cancelled' ? '#842029' : '#856404'}; font-size: 0.75rem; font-weight: 600; border-radius: 4px;">
                                                ${order.status.toUpperCase()}
                                            </span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between;">
                                            <span>${order.items.length} item(s)</span>
                                            <span style="font-weight: 700; color: var(--primary);">$${order.total.toFixed(2)}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('profileForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const updates = {
                    name: document.getElementById('profileName').value,
                    email: document.getElementById('profileEmail').value,
                    phone: document.getElementById('profilePhone').value
                };
                if (Auth.updateProfile(updates)) {
                    document.getElementById('profileAlert').innerHTML = `<div class="alert alert-success"><i class="fas fa-check"></i> Profile updated!</div>`;
                    setTimeout(() => { document.getElementById('profileAlert').innerHTML = ''; }, 3000);
                }
            });
        }

        function showSection(section) {
            document.querySelectorAll('.profile-section').forEach(s => s.style.display = 'none');
            document.getElementById(section + 'Section').style.display = 'block';
        }

        function logout() {
            if (confirm('Logout?')) {
                Auth.logout();
                window.location.href = 'index.html';
            }
        }
    </script>
    
    <style>
        .profile-nav:hover { background: var(--section-bg); }
        .profile-nav.active { background: var(--primary-light); color: var(--primary); }
        @media (max-width: 768px) {
            #profileContent > div { grid-template-columns: 1fr !important; }
        }
    </style>
</body>
</html>
