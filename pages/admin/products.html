<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - TechHub Admin</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div style="display: flex; min-height: 100vh;">
        <aside style="width: 250px; background: white; border-right: 1px solid var(--border); padding: 24px; position: fixed; height: 100vh; overflow-y: auto;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 40px;">
                <div class="logo-icon"></div>
                <span style="font-family: var(--font-heading); font-weight: 800; font-size: 1.25rem;">TechHub</span>
            </div>
            
            <nav>
                <a href="dashboard.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="products.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--primary); background: var(--primary-light); font-weight: 600; margin-bottom: 8px;">
                    <i class="fas fa-box"></i> Products
                </a>
                <a href="orders.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;">
                    <i class="fas fa-shopping-bag"></i> Orders
                </a>
                <a href="users.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;">
                    <i class="fas fa-users"></i> Users
                </a>
                <a href="#" onclick="logout()" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: #dc3545; font-weight: 600; margin-top: 40px;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>
        
        <main style="flex: 1; margin-left: 250px; padding: 24px 40px; background: var(--page-bg);">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h1 style="font-size: 1.75rem;">Product Management</h1>
                <button class="btn btn-primary" onclick="showProductModal()">
                    <i class="fas fa-plus"></i> Add Product
                </button>
            </header>
            
            <div style="background: white; border-radius: 12px; border: 1px solid var(--border-light); padding: 24px;">
                <div style="display: flex; gap: 16px; margin-bottom: 24px;">
                    <input type="text" id="searchInput" placeholder="Search products..." oninput="filterProducts()" style="flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-family: var(--font-body);">
                    <select id="categoryFilter" onchange="filterProducts()" style="padding: 12px; border: 1px solid var(--border); border-radius: 6px; min-width: 150px;">
                        <option value="">All Categories</option>
                        <option value="smartphone">Smartphones</option>
                        <option value="laptop">Laptops</option>
                        <option value="tablet">Tablets</option>
                        <option value="accessory">Accessories</option>
                    </select>
                </div>
                
                <div id="productsTable"></div>
            </div>
        </main>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Product</h2>
                <button class="modal-close" onclick="closeProductModal()">×</button>
            </div>
            
            <form id="productForm">
                <input type="hidden" id="productId">
                
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="productName" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Brand *</label>
                        <input type="text" id="productBrand" required>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="productCategory" required>
                            <option value="">Select</option>
                            <option value="smartphone">Smartphone</option>
                            <option value="laptop">Laptop</option>
                            <option value="tablet">Tablet</option>
                            <option value="accessory">Accessory</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Price ($) *</label>
                        <input type="number" id="productPrice" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Old Price ($)</label>
                        <input type="number" id="productOldPrice" step="0.01">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Stock *</label>
                        <input type="number" id="productStock" required>
                    </div>
                    <div class="form-group">
                        <label>Badge</label>
                        <select id="productBadge">
                            <option value="">None</option>
                            <option value="new">New</option>
                            <option value="hot">Hot</option>
                            <option value="sale">Sale</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="productDescription" rows="3" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-family: var(--font-body);"></textarea>
                </div>
                
                <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px;">
                    <button type="button" class="btn btn-outline" onclick="closeProductModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../js/products.js"></script>
    <script src="../../js/cart.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/checkout.js"></script>
    <script>
        let adminProducts = [...products];
        
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.protectAdmin()) return;
            loadProducts();
            document.getElementById('productForm').addEventListener('submit', saveProduct);
        });

        function loadProducts() {
            const container = document.getElementById('productsTable');
            container.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: var(--section-bg);">
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Product</th>
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Category</th>
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Price</th>
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Stock</th>
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productsBody"></tbody>
                </table>
            `;
            renderProductRows(adminProducts);
        }

        function renderProductRows(productList) {
            const tbody = document.getElementById('productsBody');
            if (productList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="padding: 40px; text-align: center; color: var(--muted);">No products found</td></tr>`;
                return;
            }
            
            tbody.innerHTML = productList.map(product => `
                <tr style="border-bottom: 1px solid var(--border-light);">
                    <td style="padding: 16px 12px;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="width: 50px; height: 50px; background: var(--section-bg); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-box" style="color: var(--muted);"></i>
                            </div>
                            <div>
                                <p style="font-weight: 600; margin: 0;">${product.name}</p>
                                <p style="color: var(--muted); font-size: 0.875rem; margin: 0;">${product.brand}</p>
                            </div>
                        </div>
                    </td>
                    <td style="padding: 16px 12px; text-transform: capitalize;">${product.category}</td>
                    <td style="padding: 16px 12px;">
                        <strong style="color: var(--primary);">$${product.price}</strong>
                        ${product.oldPrice ? `<br><small style="color: var(--muted); text-decoration: line-through;">$${product.oldPrice}</small>` : ''}
                    </td>
                    <td style="padding: 16px 12px;">${product.stock}</td>
                    <td style="padding: 16px 12px;">
                        <button onclick="editProduct(${product.id})" style="background: var(--primary-light); color: var(--primary); border: none; width: 36px; height: 36px; border-radius: 6px; cursor: pointer; margin-right: 8px;"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProduct(${product.id})" style="background: rgba(220,53,69,0.1); color: #dc3545; border: none; width: 36px; height: 36px; border-radius: 6px; cursor: pointer;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function filterProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            
            let filtered = adminProducts.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(search) || p.brand.toLowerCase().includes(search);
                const matchCategory = !category || p.category === category;
                return matchSearch && matchCategory;
            });
            
            renderProductRows(filtered);
        }

        function showProductModal(product = null) {
            document.getElementById('productModal').classList.add('active');
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            
            if (product) {
                document.getElementById('modalTitle').textContent = 'Edit Product';
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productBrand').value = product.brand;
                document.getElementById('productCategory').value = product.category;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productOldPrice').value = product.oldPrice || '';
                document.getElementById('productStock').value = product.stock;
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productBadge').value = product.badge || '';
            } else {
                document.getElementById('modalTitle').textContent = 'Add Product';
            }
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
        }

        function editProduct(id) {
            const product = adminProducts.find(p => p.id === id);
            if (product) showProductModal(product);
        }

        function saveProduct(e) {
            e.preventDefault();
            
            const productId = document.getElementById('productId').value;
            const productData = {
                id: productId ? parseInt(productId) : Date.now(),
                name: document.getElementById('productName').value,
                brand: document.getElementById('productBrand').value,
                category: document.getElementById('productCategory').value,
                price: parseFloat(document.getElementById('productPrice').value),
                oldPrice: document.getElementById('productOldPrice').value ? parseFloat(document.getElementById('productOldPrice').value) : null,
                stock: parseInt(document.getElementById('productStock').value),
                description: document.getElementById('productDescription').value,
                image: `https://via.placeholder.com/200x150/EEEEF5/3B4CF8?text=${encodeURIComponent(document.getElementById('productName').value)}`,
                badge: document.getElementById('productBadge').value || null,
                rating: 4.5, reviews: 0,
                specs: {}, colors: [], storages: []
            };
            
            if (productId) {
                const index = adminProducts.findIndex(p => p.id === parseInt(productId));
                if (index > -1) adminProducts[index] = { ...adminProducts[index], ...productData };
            } else {
                adminProducts.push(productData);
            }
            
            closeProductModal();
            renderProductRows(adminProducts);
        }

        function deleteProduct(id) {
            if (confirm('Delete this product?')) {
                adminProducts = adminProducts.filter(p => p.id !== id);
                renderProductRows(adminProducts);
            }
        }

        function logout() {
            if (confirm('Logout?')) { Auth.logout(); window.location.href = 'login.html'; }
        }
    </script>
</body>
</html>
