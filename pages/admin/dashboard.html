<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TechHub Admin</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div style="display: flex; min-height: 100vh;">
        <aside style="width: 250px; background: white; border-right: 1px solid var(--border); padding: 24px; position: fixed; height: 100vh; overflow-y: auto;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 40px;">
                <div class="logo-icon"></div>
                <span style="font-family: var(--font-heading); font-weight: 800; font-size: 1.25rem;">TechHub</span>
            </div>
            
            <nav>
                <a href="dashboard.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--primary); background: var(--primary-light); font-weight: 600; margin-bottom: 8px;">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="products.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;">
                    <i class="fas fa-box"></i> Products
                </a>
                <a href="orders.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;">
                    <i class="fas fa-shopping-bag"></i> Orders
                </a>
                <a href="users.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;">
                    <i class="fas fa-users"></i> Users
                </a>
                <a href="../../index.html" target="_blank" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;">
                    <i class="fas fa-external-link-alt"></i> View Store
                </a>
                <a href="#" onclick="logout()" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: #dc3545; font-weight: 600; margin-top: 40px;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>
        
        <main style="flex: 1; margin-left: 250px; padding: 24px 40px; background: var(--page-bg);">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h1 style="font-size: 1.75rem;">Dashboard</h1>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="text-align: right;">
                        <p style="font-weight: 600; margin: 0;" id="adminName">Admin User</p>
                        <p style="color: var(--muted); font-size: 0.875rem; margin: 0;">Administrator</p>
                    </div>
                    <div style="width: 44px; height: 44px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">A</div>
                </div>
            </header>
            
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px;">
                <div style="background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light);">
                    <div style="width: 48px; height: 48px; background: var(--primary-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
                        <i class="fas fa-box" style="font-size: 1.25rem; color: var(--primary);"></i>
                    </div>
                    <h3 style="font-size: 2rem; margin: 0 0 4px;" id="productCount">12</h3>
                    <p style="color: var(--muted); margin: 0; font-size: 0.875rem;">Total Products</p>
                </div>
                <div style="background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light);">
                    <div style="width: 48px; height: 48px; background: rgba(25,135,84,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
                        <i class="fas fa-shopping-bag" style="font-size: 1.25rem; color: #198754;"></i>
                    </div>
                    <h3 style="font-size: 2rem; margin: 0 0 4px;" id="orderCount">0</h3>
                    <p style="color: var(--muted); margin: 0; font-size: 0.875rem;">Total Orders</p>
                </div>
                <div style="background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light);">
                    <div style="width: 48px; height: 48px; background: rgba(255,193,7,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
                        <i class="fas fa-users" style="font-size: 1.25rem; color: #ffc107;"></i>
                    </div>
                    <h3 style="font-size: 2rem; margin: 0 0 4px;" id="userCount">0</h3>
                    <p style="color: var(--muted); margin: 0; font-size: 0.875rem;">Registered Users</p>
                </div>
                <div style="background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border-light);">
                    <div style="width: 48px; height: 48px; background: rgba(220,53,69,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px;">
                        <i class="fas fa-dollar-sign" style="font-size: 1.25rem; color: #dc3545;"></i>
                    </div>
                    <h3 style="font-size: 2rem; margin: 0 0 4px;" id="revenue">$0</h3>
                    <p style="color: var(--muted); margin: 0; font-size: 0.875rem;">Total Revenue</p>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
                <div style="background: white; border-radius: 12px; border: 1px solid var(--border-light); overflow: hidden;">
                    <div style="padding: 16px 24px; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0;">Recent Orders</h3>
                        <a href="orders.html" class="btn btn-outline btn-sm">View All</a>
                    </div>
                    <div id="recentOrdersList" style="padding: 16px 24px;">
                        <p style="text-align: center; color: var(--muted);">No orders yet</p>
                    </div>
                </div>
                
                <div style="background: white; border-radius: 12px; border: 1px solid var(--border-light); overflow: hidden;">
                    <div style="padding: 16px 24px; border-bottom: 1px solid var(--border-light);">
                        <h3 style="margin: 0;">Quick Actions</h3>
                    </div>
                    <div style="padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <a href="products.html" style="padding: 16px; background: var(--section-bg); border-radius: 8px; text-align: center; color: var(--body);">
                            <i class="fas fa-plus" style="font-size: 1.5rem; margin-bottom: 8px; display: block;"></i>
                            <span style="font-weight: 600;">Add Product</span>
                        </a>
                        <a href="orders.html" style="padding: 16px; background: var(--section-bg); border-radius: 8px; text-align: center; color: var(--body);">
                            <i class="fas fa-search" style="font-size: 1.5rem; margin-bottom: 8px; display: block;"></i>
                            <span style="font-weight: 600;">View Orders</span>
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../../js/products.js"></script>
    <script src="../../js/cart.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/checkout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.protectAdmin()) return;
            
            const user = Auth.getCurrentUser();
            document.getElementById('adminName').textContent = user.name;
            
            loadDashboardData();
        });

        function loadDashboardData() {
            const orders = Checkout.getAllOrders();
            const users = Auth.getUsers();
            
            document.getElementById('productCount').textContent = products.length;
            document.getElementById('orderCount').textContent = orders.length;
            document.getElementById('userCount').textContent = users.length;
            
            const totalRevenue = orders.reduce((sum, order) => sum + order.total, 0);
            document.getElementById('revenue').textContent = '$' + totalRevenue.toFixed(2);
            
            const recentOrders = orders.slice(-5).reverse();
            if (recentOrders.length > 0) {
                document.getElementById('recentOrdersList').innerHTML = recentOrders.map(order => `
                    <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-light);">
                        <div>
                            <p style="font-weight: 600; margin: 0;">#${order.id}</p>
                            <p style="color: var(--muted); font-size: 0.875rem; margin: 0;">${order.userEmail}</p>
                        </div>
                        <div style="text-align: right;">
                            <p style="font-weight: 600; margin: 0;">$${order.total.toFixed(2)}</p>
                            <span style="font-size: 0.75rem; padding: 2px 8px; background: ${order.status === 'delivered' ? '#d1e7dd' : '#fff3cd'}; border-radius: 4px;">${order.status}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function logout() {
            if (confirm('Logout?')) {
                Auth.logout();
                window.location.href = 'login.html';
            }
        }
    </script>
    
    <style>
        @media (max-width: 1024px) {
            main { margin-left: 0 !important; }
            aside { transform: translateX(-100%); transition: transform 0.3s; }
            aside.open { transform: translateX(0); }
            div[style*="grid-template-columns: repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }
            div[style*="grid-template-columns: 2fr 1fr"] { grid-template-columns: 1fr !important; }
        }
    </style>
</body>
</html>
