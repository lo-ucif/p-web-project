<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TechHub</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <div style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <div class="logo-icon"></div>
                <h1>TechHub</h1>
            </div>
            <p style="color: var(--muted); margin-top: 8px;">Admin Portal</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="admin@techhub.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 24px;">
            <a href="../../index.html" style="color: var(--muted); font-size: 0.875rem;">
                <i class="fas fa-arrow-left"></i> Back to Store
            </a>
        </div>
    </div>

    <script src="../../js/products.js"></script>
    <script src="../../js/cart.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/checkout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initDemoUsers();
            
            if (Auth.isAdmin()) {
                window.location.href = 'dashboard.html';
                return;
            }
            
            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const result = Auth.login(email, password);
                
                if (result.success && result.user.role === 'admin') {
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else if (result.success) {
                    showAlert('Access denied. Admin privileges required.', 'danger');
                } else {
                    showAlert(result.message, 'danger');
                }
            });
        });

        function initDemoUsers() {
            const users = Auth.getUsers();
            if (users.length === 0) {
                Auth.signup('Admin User', 'admin@techhub.com', 'admin123', '+1234567890');
                const adminUser = Auth.getUsers().find(u => u.email === 'admin@techhub.com');
                if (adminUser) {
                    adminUser.role = 'admin';
                    Auth.saveUsers(Auth.getUsers());
                }
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }
    </script>
</body>
</html>
