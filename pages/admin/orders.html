<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - TechHub Admin</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div style="display: flex; min-height: 100vh;">
        <aside style="width: 250px; background: white; border-right: 1px solid var(--border); padding: 24px; position: fixed; height: 100vh;">
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 40px;">
                <div class="logo-icon"></div>
                <span style="font-family: var(--font-heading); font-weight: 800; font-size: 1.25rem;">TechHub</span>
            </div>
            <nav>
                <a href="dashboard.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="products.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;"><i class="fas fa-box"></i> Products</a>
                <a href="orders.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--primary); background: var(--primary-light); font-weight: 600; margin-bottom: 8px;"><i class="fas fa-shopping-bag"></i> Orders</a>
                <a href="users.html" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: var(--body); font-weight: 600; margin-bottom: 8px;"><i class="fas fa-users"></i> Users</a>
                <a href="#" onclick="logout()" style="display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 8px; color: #dc3545; font-weight: 600; margin-top: 40px;"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>
        
        <main style="flex: 1; margin-left: 250px; padding: 24px 40px; background: var(--page-bg);">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h1 style="font-size: 1.75rem;">Order Management</h1>
                <button class="btn btn-outline" onclick="exportOrders()"><i class="fas fa-download"></i> Export</button>
            </header>
            
            <div style="background: white; border-radius: 12px; border: 1px solid var(--border-light); padding: 24px;">
                <div style="display: flex; gap: 16px; margin-bottom: 24px;">
                    <input type="text" id="searchInput" placeholder="Search orders..." oninput="filterOrders()" style="flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 6px;">
                    <select id="statusFilter" onchange="filterOrders()" style="padding: 12px; border: 1px solid var(--border); border-radius: 6px;">
                        <option value="">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div id="ordersTable"></div>
            </div>
        </main>
    </div>

    <script src="../../js/products.js"></script>
    <script src="../../js/cart.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/checkout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!Auth.protectAdmin()) return;
            loadOrders();
        });

        function loadOrders() {
            const orders = Checkout.getAllOrders();
            const container = document.getElementById('ordersTable');
            
            if (orders.length === 0) {
                container.innerHTML = `<p style="text-align: center; padding: 40px; color: var(--muted);">No orders found</p>`;
                return;
            }
            
            container.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: var(--section-bg);">
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Order ID</th>
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Customer</th>
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Items</th>
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Total</th>
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Status</th>
                            <th style="padding: 12px; text-align: left; font-size: 0.875rem; color: var(--muted);">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersBody"></tbody>
                </table>
            `;
            renderOrderRows(orders);
        }

        function renderOrderRows(orders) {
            const tbody = document.getElementById('ordersBody');
            tbody.innerHTML = orders.map(order => `
                <tr style="border-bottom: 1px solid var(--border-light);">
                    <td style="padding: 16px 12px;"><strong>#${order.id}</strong></td>
                    <td style="padding: 16px 12px;">${order.userEmail}</td>
                    <td style="padding: 16px 12px;">${order.items.length} item(s)</td>
                    <td style="padding: 16px 12px;"><strong style="color: var(--primary);">$${order.total.toFixed(2)}</strong></td>
                    <td style="padding: 16px 12px;">
                        <select onchange="updateStatus('${order.id}', this.value)" style="padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); font-weight: 600; font-size: 0.75rem;">
                            <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
                            <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
                            <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                            <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                            <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select>
                    </td>
                    <td style="padding: 16px 12px;">
                        <button onclick="viewOrder('${order.id}')" style="background: var(--primary-light); color: var(--primary); border: none; width: 36px; height: 36px; border-radius: 6px; cursor: pointer;"><i class="fas fa-eye"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function filterOrders() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            
            let orders = Checkout.getAllOrders().filter(order => {
                const matchSearch = order.id.toLowerCase().includes(search) || order.userEmail.toLowerCase().includes(search);
                const matchStatus = !status || order.status === status;
                return matchSearch && matchStatus;
            });
            
            renderOrderRows(orders);
        }

        function updateStatus(orderId, status) {
            Checkout.updateOrderStatus(orderId, status);
        }

        function viewOrder(orderId) {
            const order = Checkout.getOrderById(orderId);
            if (!order) return;
            alert(`Order #${order.id}\nCustomer: ${order.userEmail}\nTotal: $${order.total.toFixed(2)}\nStatus: ${order.status}`);
        }

        function exportOrders() {
            const orders = Checkout.getAllOrders();
            if (orders.length === 0) { alert('No orders to export'); return; }
            let csv = 'Order ID,Customer,Total,Status\n';
            orders.forEach(o => csv += `${o.id},${o.userEmail},${o.total.toFixed(2)},${o.status}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'orders.csv'; a.click();
        }

        function logout() { if (confirm('Logout?')) { Auth.logout(); window.location.href = 'login.html'; } }
    </script>
</body>
</html>
